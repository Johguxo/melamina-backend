services:
  postgres:
    image: postgres:18
    container_name: melamina-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: melamina
      POSTGRES_PASSWORD: melamina
      POSTGRES_DB: melamina_dev
    ports:
      - "5432:5432"
    volumes:
      - melamina-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melamina -d melamina_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  melamina-pg-data:
